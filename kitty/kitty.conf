# ---------------------------------------------------------
# THE "SPACE GREY / NEURAL" AESTHETIC CONFIG
# ---------------------------------------------------------

font_family MesloLGS Nerd Font
font_size 9.0

# Background & Transparency (Deep, neutral space grey)
background #1c1c1e
background_opacity 0.90
dynamic_background_opacity yes

# Foreground / Text (Crisp silver-white for high contrast)
foreground #e5e5ea

# Window Padding (Creates that deep, framed look around the text)
window_padding_width 15

# Window Borders 
draw_minimal_borders yes
window_border_width 2.5pt

# The Active Border (Electric Cyan to match the AI wallpapers)
active_border_color #1e4a60
#0f2c3e, 1e4a60
#b95014 -> Subtle Rust

# The Inactive Border (Slightly lighter graphite to separate panes subtly)
inactive_border_color #2c2c2e 

# The Transparency Trick 
# Fades the text of the windows you aren't actively typing in by 50%
inactive_text_alpha 1.0

# Hide the OS Title Bar (Essential for this look)
linux_display_server wayland
hide_window_decorations yes

# Tiling Layout (Default to the 'Tall' layout)
enabled_layouts tall, grid, stack, splits, vertical


# ---------------------------------------------------------

# MANUAL SPLITTING (Requires the 'splits' layout)

# ---------------------------------------------------------


# Create a horizontal split (top/bottom)

map ctrl+alt+h launch --location=hsplit --cwd=current


# Create a vertical split (left/right)

map ctrl+alt+v launch --location=vsplit --cwd=current


# Quickly switch to the 'splits' layout

map ctrl+alt+s goto_layout splits


# ---------------------------------------------------------

# BROADCAST MODE

# ---------------------------------------------------------

# Unlock the remote control API so the broadcast script can inject text

allow_remote_control yes


# Bind the Broadcast Kitten to F11

map f11 launch --allow-remote-control kitty +kitten broadcast 

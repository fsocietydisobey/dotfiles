# ---------------------------------------------------------
# CATPPUCCIN MOCHA AESTHETIC CONFIG
# ---------------------------------------------------------
# Backup of previous "Space Grey" config: kitty.conf.spacegrey.bak

font_family MesloLGS Nerd Font
font_size 9.0

# ---------------------------------------------------------
# CATPPUCCIN MOCHA — Color palette
# Source: https://github.com/catppuccin/kitty
# ---------------------------------------------------------

# Background & Transparency (space gray — slightly lighter, slightly warm)
background              #222224
background_opacity      1.0
dynamic_background_opacity yes

# Foreground / Text
foreground              #CDD6F4

# Selection
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Window borders
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Tab bar
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Marks
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# Terminal colors (16-color palette)
# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8

# ---------------------------------------------------------
# WINDOW LAYOUT
# ---------------------------------------------------------

# Window Padding (Creates that deep, framed look around the text)
window_padding_width 4

# Window Borders (hairline, just enough to see the split)
draw_minimal_borders yes
window_border_width 0.5pt
active_border_color   #313244
inactive_border_color #313244

# Inactive text alpha (1.0 = no fade, lower = dimmer inactive panes)
inactive_text_alpha 0.75

# Hide the OS Title Bar
linux_display_server wayland
hide_window_decorations yes

# Tiling Layout
enabled_layouts tall, grid, stack, splits, vertical


# ---------------------------------------------------------
# MANUAL SPLITTING (Requires the 'splits' layout)
# ---------------------------------------------------------

# Create a horizontal split (top/bottom)
map ctrl+alt+h launch --location=hsplit --cwd=current

# Create a vertical split (left/right)
map ctrl+alt+v launch --location=vsplit --cwd=current

# Quickly switch to the 'splits' layout
map ctrl+alt+s goto_layout splits

# Detach/reattach the current window (pane) — prompts for destination
# (existing tab, existing OS window, or new OS window)
map ctrl+alt+d detach_window ask

# Detach/reattach the current tab — prompts for destination
map ctrl+alt+shift+d detach_tab ask


# ---------------------------------------------------------
# BROADCAST MODE
# ---------------------------------------------------------

# Unlock the remote control API so the broadcast script can inject text
allow_remote_control yes

# Share a socket so all kitty instances see each other. This lets
# detach_window / detach_tab move windows across separate OS windows.
listen_on unix:/tmp/kitty

# Bind the Broadcast Kitten to F11 (scoped to the current tab only)
map f11 launch --allow-remote-control kitty +kitten broadcast --match-tab state:focused
